name: SEO Автопилот — генерация статей блога

on:
  schedule:
    # Каждый понедельник в 06:00 UTC = 09:00 МСК
    - cron: '0 6 * * 1'
  # Ручной запуск для теста
  workflow_dispatch:

jobs:
  generate-article:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Запуск генератора статей
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd seo-autopilot
          python generate.py
      
      - name: Коммит новой статьи
        run: |
          git config --local user.email "seo-autopilot@cersanit-spb.ru"
          git config --local user.name "SEO Autopilot"
          git add -A
          if git diff --staged --quiet; then
            echo "Нет изменений для коммита"
          else
            git commit -m "🤖 SEO автопилот: новая статья блога $(date +%Y-%m-%d)"
            git push
          fi
